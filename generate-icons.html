<!DOCTYPE html>
<html>
<head>
    <title>Icon Generator</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        canvas { border: 1px solid #ccc; margin: 10px 0; display: block; }
        button { background: #1e293b; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #334155; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Ultra Training Coach - Icon Generator</h2>
        <p>Click the buttons below to download app icons:</p>

        <canvas id="canvas192" width="192" height="192"></canvas>
        <button onclick="downloadIcon(192)">Download 192x192 Icon</button>

        <canvas id="canvas512" width="512" height="512"></canvas>
        <button onclick="downloadIcon(512)">Download 512x512 Icon</button>
    </div>

    <script>
        function drawIcon(size) {
            const canvas = document.getElementById(`canvas${size}`);
            const ctx = canvas.getContext('2d');

            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#1e293b');
            gradient.addColorStop(1, '#3b82f6');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            // Running figure icon
            ctx.strokeStyle = 'white';
            ctx.fillStyle = 'white';
            ctx.lineWidth = size * 0.03;

            const scale = size / 100;
            ctx.save();
            ctx.translate(size / 2, size / 2);
            ctx.scale(scale, scale);

            // Head
            ctx.beginPath();
            ctx.arc(-10, -25, 8, 0, Math.PI * 2);
            ctx.fill();

            // Body
            ctx.beginPath();
            ctx.moveTo(-10, -17);
            ctx.lineTo(-5, 5);
            ctx.stroke();

            // Arms
            ctx.beginPath();
            ctx.moveTo(-8, -10);
            ctx.lineTo(-20, 0);
            ctx.moveTo(-8, -10);
            ctx.lineTo(5, -5);
            ctx.stroke();

            // Legs
            ctx.beginPath();
            ctx.moveTo(-5, 5);
            ctx.lineTo(-15, 25);
            ctx.moveTo(-5, 5);
            ctx.lineTo(5, 20);
            ctx.stroke();

            // Mountain path
            ctx.beginPath();
            ctx.moveTo(-35, 30);
            ctx.lineTo(-25, 15);
            ctx.lineTo(-15, 20);
            ctx.lineTo(-5, 10);
            ctx.lineTo(5, 15);
            ctx.lineTo(15, 5);
            ctx.lineTo(25, 10);
            ctx.lineTo(35, 0);
            ctx.lineWidth = size * 0.02;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.stroke();

            ctx.restore();
        }

        function downloadIcon(size) {
            const canvas = document.getElementById(`canvas${size}`);
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Draw icons on load
        drawIcon(192);
        drawIcon(512);
    </script>
</body>
</html>
